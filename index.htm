<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tweetshot — Turn Tweets into Beautiful Images</title>
    <meta name="description" content="Transform any X (Twitter) post into a stunning, shareable image. Free, fast, and no login required.">

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- App Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Ambient Background -->
    <div class="ambient-bg" aria-hidden="true">
        <div class="ambient-orb ambient-orb--1"></div>
        <div class="ambient-orb ambient-orb--2"></div>
        <div class="ambient-orb ambient-orb--3"></div>
    </div>
    <div class="noise-overlay" aria-hidden="true"></div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- App -->
    <div class="app">

        <!-- Header -->
        <header class="header">
            <div class="header__badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                free &amp; instant
            </div>
            <h1 class="header__title">Tweetshot</h1>
            <p class="header__subtitle">Transform any X (Twitter) post into a stunning, shareable image.</p>
        </header>

        <!-- Input Card -->
        <div class="input-card">
            <form id="tweet-form" class="input-wrapper">
                <div class="input-field-wrapper">
                    <input type="url" id="tweet-url" class="input-field" placeholder="Paste a tweet URL..." required autocomplete="off">
                    <div class="input-field-wrapper__icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
                    </div>
                </div>
                <button type="submit" id="generate-btn" class="generate-btn">
                    <svg id="icon-bolt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    <svg id="icon-spinner" class="animate-spin hidden" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/><path fill="currentColor" opacity="0.75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg>
                    <span id="btn-text">Generate</span>
                </button>
            </form>
        </div>

        <!-- Skeleton Loader -->
        <div id="skeleton" class="skeleton-card hidden">
            <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
                <div class="skeleton-circle" style="width:48px;height:48px;flex-shrink:0"></div>
                <div style="flex:1">
                    <div class="skeleton-line" style="width:40%;margin-bottom:8px"></div>
                    <div class="skeleton-line" style="width:25%;height:10px"></div>
                </div>
            </div>
            <div class="skeleton-line" style="width:95%;margin-bottom:10px;height:16px"></div>
            <div class="skeleton-line" style="width:80%;margin-bottom:10px;height:16px"></div>
            <div class="skeleton-line" style="width:60%;margin-bottom:20px;height:16px"></div>
            <div class="skeleton-rect" style="width:100%;height:200px;margin-bottom:20px"></div>
            <div style="display:flex;gap:24px">
                <div class="skeleton-line" style="width:60px;height:10px"></div>
                <div class="skeleton-line" style="width:60px;height:10px"></div>
                <div class="skeleton-line" style="width:60px;height:10px"></div>
            </div>
        </div>

        <!-- Result -->
        <div id="result" class="result-section hidden">
            <div class="result-header">
                <h2 class="result-header__title">✨ Your image is ready</h2>
            </div>

            <div class="result-preview">
                <img id="result-image" alt="Generated tweet image">
            </div>

            <!-- Export Controls -->
            <div class="export-controls">
                <div class="export-row">
                    <span class="export-label">Format</span>
                    <div class="format-pills">
                        <button data-format="png" class="format-pill active">PNG</button>
                        <button data-format="jpeg" class="format-pill">JPEG</button>
                        <button data-format="webp" class="format-pill">WebP</button>
                    </div>
                </div>
                <div id="quality-control" class="quality-row hidden">
                    <span class="export-label">Quality</span>
                    <div class="quality-slider-wrap">
                        <input type="range" id="quality-slider" class="quality-slider" min="10" max="100" value="92">
                        <span id="quality-value" class="quality-value">92%</span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-row">
                <a id="download-btn" href="#" download="tweet.png" class="action-btn action-btn--download">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span id="download-btn-text">Download PNG</span>
                </a>
                <button id="copy-btn" class="action-btn action-btn--copy" type="button">
                    <svg id="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                    <svg id="check-icon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span id="copy-btn-text">Copy to clipboard</span>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>built by <a href="https://github.com/dashaneka" target="_blank" rel="noopener">rajnish bodha</a></p>
        </footer>
    </div>

    <!-- ========================================
         HIDDEN CANVAS SOURCE (rendered by html2canvas)
         ======================================== -->
    <div id="tweet-canvas-source" class="tweet-card-source">
        <div class="tc-inner">
            <!-- Header: avatar + name/handle + X logo -->
            <div class="tc-header">
                <img id="tc-avatar" class="tc-avatar" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==">
                <div class="tc-author">
                    <div id="tc-name" class="tc-name">Author</div>
                    <div id="tc-handle" class="tc-handle">@handle</div>
                </div>
                <svg class="tc-x-logo" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </div>

            <!-- Tweet body -->
            <div id="tc-body" class="tc-body"></div>

            <!-- Media -->
            <img id="tc-single-media" class="tc-single-media" src="">
            <div id="tc-media-gallery" class="tc-media-grid hidden"></div>

            <!-- Quote Tweet -->
            <div id="tc-quote" class="tc-quote hidden">
                <div class="tc-quote-header">
                    <img id="tc-quote-avatar" class="tc-quote-avatar" src="">
                    <span id="tc-quote-name" class="tc-quote-name"></span>
                    <span id="tc-quote-handle" class="tc-quote-handle"></span>
                </div>
                <div id="tc-quote-body" class="tc-quote-body"></div>
                <div id="tc-quote-media" class="tc-media-grid hidden" style="margin-top:10px"></div>
            </div>

            <!-- Timestamp -->
            <div id="tc-timestamp" class="tc-timestamp">10:40 PM · Apr 27, 2026</div>

            <!-- Divider -->
            <div class="tc-divider"></div>

            <!-- Stats -->
            <div class="tc-stats">
                <div class="tc-stat tc-stat--reply">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
                    <span id="tc-replies">0</span>
                </div>
                <div class="tc-stat tc-stat--repost">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2.1l4 4-4 4"/><path d="M3 12.2v-2a4 4 0 014-4h14"/><path d="M7 21.9l-4-4 4-4"/><path d="M21 11.8v2a4 4 0 01-4 4H3"/></svg>
                    <span id="tc-reposts">0</span>
                </div>
                <div class="tc-stat tc-stat--like">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                    <span id="tc-likes">0</span>
                </div>
                <div class="tc-stat tc-stat--bookmark">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <!-- App Script -->
    <script src="app.js"></script>
</body>
</html>
